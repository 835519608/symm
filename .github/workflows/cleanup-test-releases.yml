name: Cleanup Test Releases

on:
  schedule:
    # 每天一次清理测试 tag / pre-release（UTC 17:00 = 北京时间 01:00）
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      keep_latest:
        description: "保留最新 N 个测试包（仅清理测试 tag / pre-release）"
        required: false
        default: "2"

permissions:
  contents: write

jobs:
  cleanup:
    name: 清理过期测试发布
    runs-on: ubuntu-latest
    steps:
      - name: 计算保留数量
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          KEEP_LATEST="${{ github.event.inputs.keep_latest || '2' }}"
          echo "keep_latest=${KEEP_LATEST}" >> "$GITHUB_OUTPUT"

      - name: 清理过期测试 Release 与 tag
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_LATEST: ${{ steps.vars.outputs.keep_latest }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, re, subprocess
          
          repo = os.environ["REPO"]
          keep_latest = int(os.environ["KEEP_LATEST"])
          
          tag_re = re.compile(r"^v.+-test\d+$")
          
          def gh_api(args):
            cmd = ["gh", "api"] + args
            return subprocess.check_output(cmd, text=True)
          
          def delete_release(rel_id: int):
            gh_api(["-X", "DELETE", f"repos/{repo}/releases/{rel_id}"])
          
          def delete_tag_ref(tag: str):
            # delete git ref tags/<tag>
            gh_api(["-X", "DELETE", f"repos/{repo}/git/refs/tags/{tag}"])
          
          # list releases (paginate)
          releases = []
          page = 1
          while True:
            out = gh_api([f"repos/{repo}/releases?per_page=100&page={page}"])
            batch = json.loads(out)
            if not batch:
              break
            releases.extend(batch)
            page += 1
          
          # collect test prereleases
          test_prereleases = []
          for r in releases:
            tag = r.get("tag_name") or ""
            if not tag_re.match(tag):
              continue
            if not r.get("prerelease", False):
              # safety: only delete prereleases for test tags
              continue
            created = r.get("created_at") or ""
            rid = r.get("id")
            if not rid:
              continue
            test_prereleases.append((created, rid, tag))

          # sort by created_at desc; keep latest N
          test_prereleases.sort(key=lambda x: x[0], reverse=True)
          keep = test_prereleases[: max(keep_latest, 0)]
          delete = test_prereleases[max(keep_latest, 0) :]

          print(f"Found {len(test_prereleases)} test prereleases; keep_latest={keep_latest}; keeping {len(keep)}; deleting {len(delete)}")

          for created, rid, tag in delete:
            print(f"Deleting prerelease id={rid} tag={tag} created={created}")
            delete_release(rid)
            # after deleting release, delete tag ref as well
            try:
              delete_tag_ref(tag)
            except subprocess.CalledProcessError as e:
              # tag may already be gone; continue
              print(f"Tag delete skipped for {tag}: {e}")
          
          PY

