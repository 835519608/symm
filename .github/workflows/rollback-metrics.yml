name: Rollback Metrics

on:
  workflow_dispatch:
  schedule:
    # 北京时间每日 01:20（UTC 17:20）
    - cron: "20 17 * * *"

permissions:
  contents: read

jobs:
  rollback-metrics:
    name: 统计回滚成功率 (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 执行回滚指标统计
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/rollback-metrics.sh
          ./scripts/rollback-metrics.sh artifacts
          cat artifacts/rollback-metrics.md

      - name: 上传回滚指标报告
        uses: actions/upload-artifact@v4
        with:
          name: rollback-metrics-${{ github.run_id }}
          path: |
            artifacts/rollback-metrics.md
            artifacts/rollback-metrics.json
