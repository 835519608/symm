name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "symm.json"
      - "build.rs"
      - "packaging/**"
      - "symm-manifest.rc"
      - "symm.manifest"
      - "assets/**"
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "symm.json"
      - "build.rs"
      - "packaging/**"
      - "symm-manifest.rc"
      - "symm.manifest"
      - "assets/**"
      - ".github/workflows/**"
      - ".github/actions/**"

jobs:
  test:
    name: 测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 下载 GUI 内嵌字体
        uses: ./.github/actions/fetch-gui-font

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy 检查
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 全量测试
        run: cargo test --all-targets
