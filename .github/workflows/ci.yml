name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: 测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy 检查
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 全量测试
        run: cargo test --all-targets

  build:
    name: 构建发布版 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: symm-linux-x64
            bin: target/release/symm
          - os: windows-latest
            artifact: symm-windows-x64
            bin: target/release/symm.exe
          - os: macos-latest
            artifact: symm-macos-x64
            bin: target/release/symm
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 构建 release
        run: cargo build --release

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bin }}
