# 正式发布：仅匹配无连字符的 semver tag（如 v0.2.0），勿用 -test / -rc 等后缀。
# 打包前不重复跑测试：校验当前 commit 上 ci.yml 已成功。
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  verify-ci:
    name: 校验 CI 已通过
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/verify-ci-passed

  prepare-release:
    name: 准备 Release 说明
    needs: verify-ci
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          fetch-tags: true
      - id: notes
        uses: ./.github/actions/prepare-release-notes
        with:
          tag_name: ${{ github.ref_name }}

  build-and-release-windows:
    name: 发布产物 (windows-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 构建 release
        run: cargo build --release

      - name: 准备发布文件
        shell: bash
        run: cp "target/release/symm.exe" "symm-windows-x64.exe"

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: symm-windows-x64.exe
          prerelease: false
          make_latest: true

  build-and-release-linux:
    name: 发布产物 (ubuntu-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 构建 release
        run: cargo build --release

      - name: 准备发布文件
        shell: bash
        run: cp "target/release/symm" "symm-linux-x64"

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: symm-linux-x64
          prerelease: false
          make_latest: true

  build-and-release-macos:
    name: 发布产物 (macos-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 构建 release
        run: cargo build --release

      - name: 准备发布文件
        shell: bash
        run: cp "target/release/symm" "symm-macos-x64"

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: symm-macos-x64
          prerelease: false
          make_latest: true
