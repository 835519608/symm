# 正式发布：仅匹配无连字符的 semver tag（如 v0.2.0），勿用 -test / -rc 等后缀。
# 打包前不重复跑测试：校验当前 commit 上 ci.yml 已成功。
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  verify-ci:
    name: 校验 CI 已通过
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/verify-ci-passed

  prepare-release:
    name: 准备 Release 说明
    needs: verify-ci
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ github.ref_name }}
      release_version: ${{ steps.version.outputs.version }}
      release_semver: ${{ steps.version.outputs.semver }}
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        uses: ./.github/actions/resolve-release-version
      - id: notes
        uses: ./.github/actions/prepare-release-notes

  sync-scoop-manifest:
    name: 同步 Scoop manifest 版本
    needs: [prepare-release, build-and-release-windows]
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: ./.github/actions/sync-scoop-manifest
        with:
          release_version: ${{ needs.prepare-release.outputs.release_version }}

  build-and-release-windows:
    name: 发布产物 (windows-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: Windows 安装包与便携包
        uses: ./.github/actions/package-windows
        with:
          release_version: ${{ needs.prepare-release.outputs.release_version }}
          release_semver: ${{ needs.prepare-release.outputs.release_semver }}

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: |
            symm-setup-windows-x64.exe
            symm-portable-windows-x64.zip
            SHA256SUMS
          prerelease: false
          make_latest: true

  build-and-release-linux:
    name: 发布产物 (ubuntu-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 打包便携 zip
        uses: ./.github/actions/package-portable
        with:
          archive_name: symm-portable-linux-x64.zip
          release_semver: ${{ needs.prepare-release.outputs.release_semver }}

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: symm-portable-linux-x64.zip
          prerelease: false
          make_latest: true

  build-and-release-macos:
    name: 发布产物 (macos-latest)
    needs: prepare-release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 打包便携 zip
        uses: ./.github/actions/package-portable
        with:
          archive_name: symm-portable-macos-x64.zip
          release_semver: ${{ needs.prepare-release.outputs.release_semver }}

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.prepare-release.outputs.release_body }}
          files: symm-portable-macos-x64.zip
          prerelease: false
          make_latest: true
