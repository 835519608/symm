# 测试包：Pre-release，不成为 Latest，不影响正式发布流程。
#
# 触发：
#   - 推送测试 tag（见下）或手动 workflow_dispatch（勾选平台）
#
# Tag 命名：vX.Y.Z-test[-<platforms>]（test 后无数字；版本只在 X.Y.Z）
#   v0.1.0-test                 → 三端
#   v0.1.0-test-windows         → 仅 Windows
#   v0.1.0-test-linux           → 仅 Linux
#   v0.1.0-test-macos           → 仅 macOS
#   v0.1.0-test-windows-linux   → 多平台组合（别名 win / mac）
#
# 版本号：小改动 Z+1（0.1.0→0.1.1）；大变动 Y+1 且 Z 归零（0.1.2→0.2.0）
#
# 打包前不重复跑测试：校验当前 commit 上 ci.yml 已成功（见 verify-ci-passed）。
# Windows 附件：setup 安装包、便携 zip、SHA256SUMS（Scoop 校验）；不再单独上传裸 exe。
name: Release Test

on:
  push:
    tags:
      - "v*-test*"
  workflow_dispatch:
    inputs:
      build_windows:
        description: 构建 Windows 包
        type: boolean
        default: true
      build_linux:
        description: 构建 Linux 包
        type: boolean
        default: true
      build_macos:
        description: 构建 macOS 包
        type: boolean
        default: true
      release_notes:
        description: 可选，覆盖 Release 正文（默认用 tag 指向 commit 的提交说明）
        type: string
        required: false

permissions:
  contents: write
  actions: read

jobs:
  plan:
    name: 解析平台与 Release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.version }}
      release_semver: ${{ steps.version.outputs.semver }}
      release_body: ${{ steps.notes.outputs.body }}
      build_windows: ${{ steps.meta.outputs.build_windows }}
      build_linux: ${{ steps.meta.outputs.build_linux }}
      build_macos: ${{ steps.meta.outputs.build_macos }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="test-run-${{ github.run_id }}"
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          build_windows=false
          build_linux=false
          build_macos=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            [ "${{ inputs.build_windows }}" = "true" ] && build_windows=true
            [ "${{ inputs.build_linux }}" = "true" ] && build_linux=true
            [ "${{ inputs.build_macos }}" = "true" ] && build_macos=true
          elif [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-test[0-9] ]]; then
            echo "::error::测试 tag 格式无效：${RELEASE_TAG}"
            echo "勿在 test 后加数字（如 v0.1.0-test15）；应使用 vX.Y.Z-test 或 vX.Y.Z-test-windows"
            exit 1
          elif [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-test$ ]]; then
            build_windows=true
            build_linux=true
            build_macos=true
          elif [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-test-(.+)$ ]]; then
            suffix="${BASH_REMATCH[1]}"
            IFS='-' read -ra parts <<< "${suffix}"
            for part in "${parts[@]}"; do
              case "${part}" in
                windows|win) build_windows=true ;;
                linux) build_linux=true ;;
                macos|mac) build_macos=true ;;
                *)
                  echo "::error::未知平台段「${part}」（tag: ${RELEASE_TAG}）。期望形如 v0.1.0-test-windows 或 v0.1.0-test-windows-linux"
                  exit 1
                  ;;
              esac
            done
            if ! $build_windows && ! $build_linux && ! $build_macos; then
              echo "::error::未识别任何平台（tag: ${RELEASE_TAG}）"
              exit 1
            fi
          elif [[ "${RELEASE_TAG}" =~ ^test-run- ]]; then
            build_windows=true
            build_linux=true
            build_macos=true
          else
            echo "::error::测试 tag 格式无效：${RELEASE_TAG}"
            echo "期望：vX.Y.Z-test 或 vX.Y.Z-test-<platform(s)>（如 v0.1.1-test-windows）"
            exit 1
          fi

          if ! $build_windows && ! $build_linux && ! $build_macos; then
            echo "::error::至少选择一个平台"
            exit 1
          fi

          echo "build_windows=${build_windows}" >> "$GITHUB_OUTPUT"
          echo "build_linux=${build_linux}" >> "$GITHUB_OUTPUT"
          echo "build_macos=${build_macos}" >> "$GITHUB_OUTPUT"

          echo "Release tag: ${RELEASE_TAG}"
          echo "Platforms: windows=${build_windows} linux=${build_linux} macos=${build_macos}"

      - name: 校验当前 commit 的 CI 已通过
        uses: ./.github/actions/verify-ci-passed

      - id: version
        uses: ./.github/actions/resolve-release-version
        with:
          release_tag: ${{ steps.meta.outputs.release_tag }}

      - id: notes
        uses: ./.github/actions/prepare-release-notes
        with:
          dispatch_notes: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes || '' }}

  sync-scoop-manifest:
    name: 同步 Scoop manifest 版本
    needs: plan
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: ./.github/actions/sync-scoop-manifest
        with:
          release_version: ${{ needs.plan.outputs.release_version }}

  build-and-release-windows:
    name: 测试包 (windows-latest)
    needs: plan
    if: needs.plan.outputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: Windows 安装包与便携包
        uses: ./.github/actions/package-windows
        with:
          release_version: ${{ needs.plan.outputs.release_version }}
          release_semver: ${{ needs.plan.outputs.release_semver }}

      - name: 上传到 GitHub Release（测试）
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: Test ${{ needs.plan.outputs.release_tag }}
          body: ${{ needs.plan.outputs.release_body }}
          files: |
            symm-setup-windows-x64.exe
            symm-portable-windows-x64.zip
            SHA256SUMS
          prerelease: true
          make_latest: false
          generate_release_notes: false

  build-and-release-linux:
    name: 测试包 (ubuntu-latest)
    needs: plan
    if: needs.plan.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 打包便携 zip
        uses: ./.github/actions/package-portable
        with:
          archive_name: symm-portable-linux-x64.zip
          release_semver: ${{ needs.plan.outputs.release_semver }}

      - name: 上传到 GitHub Release（测试）
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: Test ${{ needs.plan.outputs.release_tag }}
          body: ${{ needs.plan.outputs.release_body }}
          files: symm-portable-linux-x64.zip
          prerelease: true
          make_latest: false
          generate_release_notes: false

  build-and-release-macos:
    name: 测试包 (macos-latest)
    needs: plan
    if: needs.plan.outputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 启用 Cargo 缓存
        uses: Swatinem/rust-cache@v2

      - name: 打包便携 zip
        uses: ./.github/actions/package-portable
        with:
          archive_name: symm-portable-macos-x64.zip
          release_semver: ${{ needs.plan.outputs.release_semver }}

      - name: 上传到 GitHub Release（测试）
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: Test ${{ needs.plan.outputs.release_tag }}
          body: ${{ needs.plan.outputs.release_body }}
          files: symm-portable-macos-x64.zip
          prerelease: true
          make_latest: false
          generate_release_notes: false
