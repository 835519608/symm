name: Sync Scoop manifest version
description: 根据发版 tag 更新 symm.json 的 version 与安装用字面量 URL（Scoop install 不展开 architecture 里的 $version）

inputs:
  release_version:
    description: 如 0.2.7-test
    required: true

runs:
  using: composite
  steps:
    - name: 更新 manifest version 与下载 URL
      shell: bash
      run: |
        set -euo pipefail
        tmp="$(mktemp)"
        jq --arg v "${{ inputs.release_version }}" '
          .version = $v
          | .architecture."64bit".url = "https://github.com/835519608/symm/releases/download/v\($v)/symm-portable-windows-x64.zip"
          | .architecture."64bit".hash.url = "https://github.com/835519608/symm/releases/download/v\($v)/SHA256SUMS"
        ' symm.json > "${tmp}"
        mv "${tmp}" symm.json
        grep -E '"version"|"url"' symm.json | head -5

    - name: 提交到默认分支
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore(scoop): manifest version ${{ inputs.release_version }}"
        file_pattern: symm.json
        branch: ${{ github.event.repository.default_branch }}
