name: Package Windows (installer + portable zip)
description: 从发版 tag 写入版本号，构建安装包 / zip / SHA256SUMS

inputs:
  release_version:
    description: 完整发布版本（如 0.2.7-test），用于 Scoop 资源路径
    required: true
  release_semver:
    description: Cargo / 安装包显示用 X.Y.Z
    required: true

runs:
  using: composite
  steps:
    - name: 应用发版版本号
      uses: ./.github/actions/apply-cargo-version
      with:
        semver: ${{ inputs.release_semver }}

    - name: 安装 Inno Setup
      shell: pwsh
      run: choco install innosetup -y --no-progress

    - name: 下载 GUI 内嵌字体
      uses: ./.github/actions/fetch-gui-font

    - name: 构建 release（CLI + GUI）
      shell: pwsh
      run: cargo build --release --features gui --bin symm --bin symm-cli

    - name: 编译便携安装包
      shell: pwsh
      run: |
        $semver = "${{ inputs.release_semver }}"
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
        if (-not (Test-Path $iscc)) { throw "ISCC not found: $iscc" }
        & $iscc "/DAppVersion=$semver" "packaging\windows\symm-setup.iss"

    - name: 打包便携 zip
      shell: pwsh
      run: |
        $root = "packaging/windows/staging/symm"
        Remove-Item -Recurse -Force "packaging/windows/staging" -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path "$root/cli", "$root/data" | Out-Null
        Copy-Item "target/release/symm.exe" "$root/"
        Copy-Item "target/release/symm-cli.exe" "$root/cli/"
        if (Test-Path "symm-portable-windows-x64.zip") { Remove-Item "symm-portable-windows-x64.zip" }
        Compress-Archive -Path "packaging/windows/staging/symm" -DestinationPath "symm-portable-windows-x64.zip"

    - name: 生成 SHA256SUMS
      shell: pwsh
      run: |
        $hash = (Get-FileHash "symm-portable-windows-x64.zip" -Algorithm SHA256).Hash.ToLower()
        "${hash}  symm-portable-windows-x64.zip" | Set-Content -Path "SHA256SUMS" -Encoding ascii -NoNewline
        Add-Content -Path "SHA256SUMS" -Value "" -Encoding ascii

    - name: 复制发布文件到工作区根目录
      shell: pwsh
      run: |
        Copy-Item "packaging/windows/dist/symm-setup-windows-x64.exe" "symm-setup-windows-x64.exe"
