name: Package portable zip (Linux / macOS)
description: 构建 symm（GUI）+ cli/symm-cli 目录布局并打 zip

inputs:
  archive_name:
    description: 例如 symm-portable-linux-x64.zip
    required: true
  release_semver:
    description: 写入 Cargo.toml 的 X.Y.Z
    required: true

runs:
  using: composite
  steps:
    - name: 应用发版版本号
      uses: ./.github/actions/apply-cargo-version
      with:
        semver: ${{ inputs.release_semver }}

    - name: 下载 GUI 内嵌字体
      uses: ./.github/actions/fetch-gui-font

    - name: 构建 release（CLI + GUI）
      shell: bash
      run: cargo build --release --features gui --bin symm --bin symm-cli

    - name: 打包便携 zip
      shell: bash
      run: |
        set -euo pipefail
        root="packaging/portable/staging/symm"
        rm -rf packaging/portable/staging
        mkdir -p "${root}/cli" "${root}/data"
        cp "target/release/symm-cli" "${root}/cli/"
        cp "target/release/symm" "${root}/"
        rm -f "${{ inputs.archive_name }}"
        (cd packaging/portable/staging && zip -r "../../../${{ inputs.archive_name }}" symm)
