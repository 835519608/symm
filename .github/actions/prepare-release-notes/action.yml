name: Prepare release notes
description: 使用 tag 指向的 commit 提交说明作为 GitHub Release 正文

inputs:
  dispatch_notes:
    description: workflow_dispatch 时可选覆盖说明
    required: false
    default: ""

outputs:
  body:
    description: Release 正文（Markdown）
    value: ${{ steps.notes.outputs.body }}

runs:
  using: composite
  steps:
    - name: 准备 Release 说明
      id: notes
      shell: bash
      env:
        DISPATCH_NOTES: ${{ inputs.dispatch_notes }}
      run: |
        set -euo pipefail

        if [ -n "${DISPATCH_NOTES}" ]; then
          body="${DISPATCH_NOTES}"
        else
          body=$(git log -1 --format=%B "${GITHUB_SHA}")
        fi

        body=$(printf '%s' "${body}" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
        if [ -z "${body}" ]; then
          body="Release ${GITHUB_REF_NAME:-${GITHUB_SHA}}"
        fi

        {
          echo "body<<NOTES_EOF"
          printf '%s\n' "${body}"
          echo "NOTES_EOF"
        } >> "${GITHUB_OUTPUT}"

        echo "Release 说明已就绪（${#body} 字符，来自 commit 提交说明）"
